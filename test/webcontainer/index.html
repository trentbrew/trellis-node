<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trellis — WebContainer test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e1e1e; --surface: #252526; --border: #3c3c3c;
      --text: #cccccc; --dim: #888; --green: #4ec94e; --red: #f44747;
      --blue: #569cd6; --accent: #007acc;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 40px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
    header .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: var(--accent); color: #fff; font-weight: 600;
    }
    #status { font-size: 11px; color: var(--dim); margin-left: auto; }

    .layout { display: flex; height: calc(100vh - 40px); }

    .pane-editor { display: flex; flex-direction: column; flex: 1; border-right: 1px solid var(--border); }
    .pane-terminal { display: flex; flex-direction: column; flex: 1; }

    .pane-header {
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px; height: 32px; background: var(--surface);
      border-bottom: 1px solid var(--border); font-size: 11px;
      color: var(--dim); flex-shrink: 0;
    }
    .pane-header span { font-weight: 600; color: var(--text); }

    #monaco-container { flex: 1; }

    #run-btn {
      display: flex; align-items: center; gap: 6px;
      margin-left: auto; padding: 3px 10px; border-radius: 3px;
      background: var(--accent); color: #fff; border: none;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    #run-btn:hover { background: #1a8ad4; }
    #run-btn:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; }
    #run-btn .icon { font-size: 10px; }

    #clear-btn {
      padding: 3px 8px; border-radius: 3px; background: transparent;
      color: var(--dim); border: 1px solid var(--border);
      font-size: 11px; cursor: pointer; margin-left: 4px;
    }
    #clear-btn:hover { color: var(--text); border-color: var(--text); }

    #terminal {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px; line-height: 1.6; background: var(--bg);
    }
    .line-stdout { color: var(--text); }
    .line-stderr { color: var(--red); }
    .line-info   { color: var(--blue); }
    .line-success{ color: var(--green); }
    .line-dim    { color: var(--dim); }
  </style>
</head>
<body>

<header>
  <h1>Trellis</h1>
  <span class="badge">WebContainer</span>
  <span id="status">Booting…</span>
</header>

<div class="layout">
  <div class="pane-editor">
    <div class="pane-header">
      <span>test.mjs</span>
      <button id="run-btn" disabled>
        <span class="icon">▶</span> Run
      </button>
    </div>
    <div id="monaco-container"></div>
  </div>

  <div class="pane-terminal">
    <div class="pane-header">
      <span>Output</span>
      <button id="clear-btn">Clear</button>
    </div>
    <div id="terminal"></div>
  </div>
</div>

<!-- Monaco Editor (AMD loader) -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>

<script type="module">
// ─── WebContainer API ────────────────────────────────────────────────────────
import { WebContainer } from 'https://cdn.jsdelivr.net/npm/@webcontainer/api@1.6.0/dist/index.js';

// ─── Terminal helpers ─────────────────────────────────────────────────────────
const terminal = document.getElementById('terminal');
const status   = document.getElementById('status');

function writeLine(text, cls = 'line-stdout') {
  for (const line of String(text).split('\n')) {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = line;
    terminal.appendChild(div);
  }
  terminal.scrollTop = terminal.scrollHeight;
}
function info(msg)    { writeLine(msg, 'line-info'); }
function success(msg) { writeLine(msg, 'line-success'); }
function err(msg)     { writeLine(msg, 'line-stderr'); }
function dim(msg)     { writeLine(msg, 'line-dim'); }

document.getElementById('clear-btn').addEventListener('click', () => { terminal.innerHTML = ''; });

// ─── Default test script ──────────────────────────────────────────────────────
const DEFAULT_SCRIPT = `\
// Trellis WebContainer test — edit and click Run
// Imports use paths relative to the mounted filesystem root.

import { TrellisVcsEngine } from './dist/vcs/index.js';

// Open an in-memory repo
const engine = new TrellisVcsEngine({ rootPath: '/tmp/repo' });
engine.open();

// Create a milestone
await engine.createMilestone('Hello from WebContainer!');
console.log('✓ milestone created');

// Create an issue
const issue = await engine.createIssue({
  title: 'First WebContainer issue',
  description: 'Created inside a StackBlitz WebContainer',
  priority: 'high',
});
console.log('✓ issue created:', issue.id);

// Read back
const issues = engine.listIssues();
const milestones = engine.listMilestones();
console.log('✓ issues:', issues.length, '| milestones:', milestones.length);

// Op count proves the kernel is persisting ops
const ops = engine.readAllOps();
console.log('✓ op count:', ops.length);

console.log('\\n🎉 Trellis works inside WebContainer!');
`;

// ─── Monaco init ──────────────────────────────────────────────────────────────
let editor;
await new Promise(resolve => {
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
  require(['vs/editor/editor.main'], () => {
    editor = monaco.editor.create(document.getElementById('monaco-container'), {
      value: DEFAULT_SCRIPT,
      language: 'javascript',
      theme: 'vs-dark',
      fontSize: 13,
      fontFamily: "'Cascadia Code', 'Fira Code', Consolas, monospace",
      lineNumbers: 'on',
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      automaticLayout: true,
      padding: { top: 12 },
    });
    resolve();
  });
});

// ─── Boot WebContainer ────────────────────────────────────────────────────────
status.textContent = 'Booting WebContainer…';
info('Booting WebContainer…');

let wc;
try {
  wc = await WebContainer.boot();
  info('WebContainer booted');
} catch (e) {
  err('WebContainer.boot() failed: ' + e.message);
  err('Make sure you are serving from localhost with COOP/COEP headers set.');
  status.textContent = 'Boot failed';
  throw e;
}

// ─── Fetch and mount dist/ ────────────────────────────────────────────────────
status.textContent = 'Fetching trellis dist…';
info('Fetching trellis dist/ from server…');

let distPack;
try {
  const res = await fetch('/api/dist-pack');
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error ?? `HTTP ${res.status}`);
  }
  distPack = await res.json();
} catch (e) {
  err('Failed to fetch dist: ' + e.message);
  status.textContent = 'Fetch failed';
  throw e;
}

const fileCount = Object.keys(distPack).length;
dim(`Mounting ${fileCount} dist files…`);

// Build the WebContainer FS tree
const distTree = {};
for (const [relPath, content] of Object.entries(distPack)) {
  const parts = relPath.split('/');
  let node = distTree;
  for (let i = 0; i < parts.length - 1; i++) {
    node[parts[i]] ??= { directory: {} };
    node = node[parts[i]].directory;
  }
  node[parts[parts.length - 1]] = { file: { contents: content } };
}

// Mount package.json + dist/ into the WebContainer
await wc.mount({
  'package.json': {
    file: {
      contents: JSON.stringify({
        name: 'trellis-wc-test',
        type: 'module',
        dependencies: { 'sql.js': '^1.14.1' },
      }, null, 2),
    },
  },
  dist: { directory: distTree },
});

info(`Mounted ${fileCount} dist files`);

// ─── npm install sql.js ───────────────────────────────────────────────────────
status.textContent = 'Installing sql.js…';
info('Running npm install sql.js…');

{
  const proc = await wc.spawn('npm', ['install', '--prefer-offline']);
  proc.output.pipeTo(new WritableStream({
    write(chunk) { dim(chunk.trim()); }
  }));
  const code = await proc.exit;
  if (code !== 0) {
    err(`npm install failed (exit ${code})`);
    status.textContent = 'npm install failed';
    throw new Error('npm install failed');
  }
  success('sql.js installed');
}

// ─── Ready ────────────────────────────────────────────────────────────────────
status.textContent = 'Ready';
success('WebContainer ready — click Run to execute the script');

const runBtn = document.getElementById('run-btn');
runBtn.disabled = false;

// ─── Run ──────────────────────────────────────────────────────────────────────
async function runScript() {
  runBtn.disabled = true;
  status.textContent = 'Running…';

  const script = editor.getValue();

  // Write the current editor content as test.mjs
  await wc.fs.writeFile('test.mjs', script);

  writeLine('');
  dim('─'.repeat(50));
  dim('$ node test.mjs');

  let exitCode;
  try {
    const proc = await wc.spawn('node', ['test.mjs']);

    proc.output.pipeTo(new WritableStream({
      write(chunk) {
        // Simple heuristic: lines starting with ✓/🎉 get green, errors get red
        for (const line of chunk.split('\n')) {
          if (!line) continue;
          if (line.startsWith('✓') || line.includes('🎉')) {
            writeLine(line, 'line-success');
          } else if (line.toLowerCase().includes('error') || line.startsWith('  at ')) {
            writeLine(line, 'line-stderr');
          } else {
            writeLine(line, 'line-stdout');
          }
        }
      }
    }));

    exitCode = await proc.exit;
  } catch (e) {
    err('Spawn failed: ' + e.message);
    exitCode = 1;
  }

  dim(`─`.repeat(50));
  if (exitCode === 0) {
    success(`Process exited 0`);
    status.textContent = 'Done ✓';
  } else {
    err(`Process exited ${exitCode}`);
    status.textContent = `Exit ${exitCode}`;
  }

  runBtn.disabled = false;
}

runBtn.addEventListener('click', runScript);
</script>
</body>
</html>
