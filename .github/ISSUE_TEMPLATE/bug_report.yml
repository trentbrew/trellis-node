name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search [existing issues](https://github.com/trentbrew/trellis/issues) before opening a new one.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `trellis status`, the op count shows ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimum steps to trigger the bug. A code snippet, gist, or repo link is ideal.
      placeholder: |
        1. trellis init
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Trellis version
      description: Run `trellis --version` or check your `package.json`
      placeholder: "3.1.13"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Bun and/or Node version
      placeholder: "Bun 1.1.34 / Node 22.10.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output, stack traces, or screenshots. Long logs go in a `<details>` block or gist.
      render: shell
