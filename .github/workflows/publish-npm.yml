name: Publish npm (trellis)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (ignored when version is set)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Exact version (overrides bump)"
        required: false
        type: string
      dry_run:
        description: "Validate and npm publish --dry-run only"
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    if: github.repository == 'trentbrew/trellis'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          current=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
            new="${tag#v}"
            if [ "$new" != "$current" ]; then
              echo "Tag ${tag} does not match package.json (${current})"
              exit 1
            fi
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            bump="${{ inputs.bump }}"
            ver="${{ inputs.version }}"
            if [ -n "$ver" ]; then
              new="$ver"
            else
              IFS='.' read -r major minor patch <<< "$current"
              case "$bump" in
                patch) patch=$((patch + 1)) ;;
                minor) minor=$((minor + 1)); patch=0 ;;
                major) major=$((major + 1)); minor=0; patch=0 ;;
                *) echo "Invalid bump: $bump"; exit 1 ;;
              esac
              new="${major}.${minor}.${patch}"
            fi
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '${new}';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${new}" >> "$GITHUB_OUTPUT"
          echo "trellis ${current} → ${new}"

      - name: Run tests
        run: >-
          bun test test/vcs test/git test/p2 test/p3 test/p4 test/p5 test/p6 test/p7
          test/engine.test.ts test/links/ test/embeddings/ test/decisions/ test/issue.test.ts

      - name: Build and validate
        run: |
          bun run build
          version=$(node -p "require('./package.json').version")
          private=$(node -p "require('./package.json').private || false")
          test "$private" = "false"
          test -f LICENSE
          test -x bin/trellis.mjs
          npm pack --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (dry-run)
        if: ${{ inputs.dry_run }}
        run: npm publish --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit, tag, and release
        if: >-
          github.event_name == 'workflow_dispatch' &&
          steps.version.outputs.bumped == 'true' &&
          !inputs.dry_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "release: trellis ${tag}"
          git tag -a "${tag}" -m "trellis ${tag}"
          git push origin HEAD "${tag}"
          gh release create "${tag}" \
            --repo "${{ github.repository }}" \
            --title "trellis ${tag}" \
            --generate-notes

      - name: Summary
        run: |
          echo "### trellis@${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run only — nothing published." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "Published from tag \`${GITHUB_REF#refs/tags/}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Published via workflow_dispatch; tag and GitHub release created." >> "$GITHUB_STEP_SUMMARY"
          fi
